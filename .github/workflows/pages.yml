# Publishes the browser playground to GitHub Pages: the admin console with
# the full service — usecases, REST API, FQL, search index — compiled to
# WebAssembly over the in-memory store. No backend, no database; data lives
# in the visitor's tab.
name: pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.25"
          check-latest: true

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build service WebAssembly
        run: |
          mkdir -p web/public
          GOOS=js GOARCH=wasm go build -ldflags="-s -w" -o web/public/flexitype.wasm ./cmd/flexitype-wasm
          cp "$(go env GOROOT)/lib/wasm/wasm_exec.js" web/public/

      - name: Build console
        working-directory: web
        env:
          VITE_WASM: "1"
          VITE_BASE: /flexitype/
        run: |
          npm ci
          npm run build
          # SPA fallback: Pages serves 404.html for unknown paths.
          cp dist/index.html dist/404.html

      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
