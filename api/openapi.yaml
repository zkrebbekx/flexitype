openapi: 3.1.0
info:
  title: flexitype API
  description: >
    Runtime-defined soft types, attributes, dependencies, relationships and
    a query language (FQL), plus event delivery. All endpoints are tenant
    scoped via the authenticated service account. See docs/api-stability.md
    for compatibility guarantees.
  version: v1
  license:
    name: MIT
servers:
  - url: /api/v1
security:
  - bearerAuth: []
tags:
  - name: types
  - name: attributes
  - name: values
  - name: entities
  - name: dependencies
  - name: relationships
  - name: query
  - name: activity
  - name: event-delivery
  - name: ops
  - name: schema
  - name: changesets
  - name: revisions
  - name: units
  - name: dedup
  - name: media
  - name: graphql

paths:
  /features:
    get:
      tags: [ops]
      summary: Report enabled capabilities
      responses:
        "200":
          description: Feature flags
          content:
            application/json:
              schema:
                type: object
                additionalProperties: { type: boolean }

  /type-definitions:
    get:
      tags: [types]
      summary: List type definitions
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/IncludeArchived"
      responses:
        "200":
          $ref: "#/components/responses/TypeDefinitionPage"
    post:
      tags: [types]
      summary: Create a type definition
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateTypeDefinition" }
      responses:
        "201": { $ref: "#/components/responses/TypeDefinition" }
        "409": { $ref: "#/components/responses/Error" }
        "422": { $ref: "#/components/responses/Error" }
  /type-definitions/{id}:
    parameters: [{ $ref: "#/components/parameters/ID" }]
    get:
      tags: [types]
      summary: Get a type definition
      responses:
        "200": { $ref: "#/components/responses/TypeDefinition" }
        "404": { $ref: "#/components/responses/Error" }
    patch:
      tags: [types]
      summary: Update a type definition
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateDisplay" }
      responses:
        "200": { $ref: "#/components/responses/TypeDefinition" }
        "404": { $ref: "#/components/responses/Error" }
  /type-definitions/{id}/archive:
    parameters: [{ $ref: "#/components/parameters/ID" }]
    post:
      tags: [types]
      summary: Archive a type definition
      responses:
        "200": { $ref: "#/components/responses/TypeDefinition" }
  /type-definitions/{id}/restore:
    parameters: [{ $ref: "#/components/parameters/ID" }]
    post:
      tags: [types]
      summary: Restore an archived type definition
      responses:
        "200": { $ref: "#/components/responses/TypeDefinition" }
  /type-definitions/{id}/attributes:
    parameters: [{ $ref: "#/components/parameters/ID" }]
    get:
      tags: [types]
      summary: List a type's own attributes
      responses:
        "200": { $ref: "#/components/responses/AttributePage" }
  /type-definitions/{id}/effective-attributes:
    parameters: [{ $ref: "#/components/parameters/ID" }]
    get:
      tags: [types]
      summary: List a type's inherited (effective) attributes
      responses:
        "200":
          description: Effective attributes with their declaring type
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/EffectiveAttribute" }
  /type-definitions/{id}/children:
    parameters: [{ $ref: "#/components/parameters/ID" }]
    get:
      tags: [types]
      summary: List direct subtypes
      responses:
        "200":
          description: Direct subtypes
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/TypeDefinition" }

  /attributes:
    get:
      tags: [attributes]
      summary: List attribute definitions
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
        - name: type_definition_id
          in: query
          schema: { type: string }
        - $ref: "#/components/parameters/IncludeArchived"
      responses:
        "200": { $ref: "#/components/responses/AttributePage" }
    post:
      tags: [attributes]
      summary: Create an attribute definition
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateAttribute" }
      responses:
        "201": { $ref: "#/components/responses/Attribute" }
        "409": { $ref: "#/components/responses/Error" }
        "422": { $ref: "#/components/responses/Error" }
  /attributes/{id}:
    parameters: [{ $ref: "#/components/parameters/ID" }]
    get:
      tags: [attributes]
      summary: Get an attribute definition
      responses:
        "200": { $ref: "#/components/responses/Attribute" }
        "404": { $ref: "#/components/responses/Error" }
    patch:
      tags: [attributes]
      summary: Update an attribute definition
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateAttribute" }
      responses:
        "200": { $ref: "#/components/responses/Attribute" }
  /attributes/{id}/archive:
    parameters: [{ $ref: "#/components/parameters/ID" }]
    post:
      tags: [attributes]
      summary: Archive an attribute definition
      responses:
        "200": { $ref: "#/components/responses/Attribute" }
  /attributes/{id}/restore:
    parameters: [{ $ref: "#/components/parameters/ID" }]
    post:
      tags: [attributes]
      summary: Restore an attribute definition
      responses:
        "200": { $ref: "#/components/responses/Attribute" }
  /attributes/{id}/validate-value:
    parameters: [{ $ref: "#/components/parameters/ID" }]
    post:
      tags: [attributes]
      summary: Validate a candidate value against an attribute
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, properties: { value: {} } }
      responses:
        "200": { description: Value is valid }
        "422": { $ref: "#/components/responses/Error" }

  /values:
    get:
      tags: [values]
      summary: List attribute values
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
      responses:
        "200": { $ref: "#/components/responses/ValuePage" }
    post:
      tags: [values]
      summary: Set an entity's attribute value
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SetValue" }
      responses:
        "201": { $ref: "#/components/responses/Value" }
        "422": { $ref: "#/components/responses/Error" }
  /values/batch:
    post:
      tags: [values]
      summary: Set many values in one transaction
      description: >
        Applies every item atomically — either all succeed and their events
        fire, or the whole batch rolls back. Max 1000 items.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [items]
              properties:
                items:
                  type: array
                  maxItems: 1000
                  items: { $ref: "#/components/schemas/SetValue" }
      responses:
        "200":
          description: Written snapshots in input order
          content:
            application/json:
              schema:
                type: object
                properties: { items: { type: array, items: { $ref: "#/components/schemas/Value" } } }
        "422": { $ref: "#/components/responses/Error" }
  /values/{id}:
    parameters: [{ $ref: "#/components/parameters/ID" }]
    get:
      tags: [values]
      summary: Get a stored value
      responses:
        "200": { $ref: "#/components/responses/Value" }
        "404": { $ref: "#/components/responses/Error" }
    delete:
      tags: [values]
      summary: Remove a value
      responses:
        "200": { $ref: "#/components/responses/Value" }

  /saved-views:
    get:
      tags: [saved-views]
      summary: List the tenant's saved views
      responses:
        "200":
          description: Saved views
          content:
            application/json:
              schema:
                type: object
                properties: { items: { type: array, items: { $ref: "#/components/schemas/SavedView" } } }
    post:
      tags: [saved-views]
      summary: Save a view
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/SavedViewInput" } } }
      responses:
        "201": { description: Created, content: { application/json: { schema: { $ref: "#/components/schemas/SavedView" } } } }
        "422": { $ref: "#/components/responses/Error" }
  /saved-views/{id}:
    parameters: [{ $ref: "#/components/parameters/ID" }]
    get:
      tags: [saved-views]
      summary: Get a saved view
      responses:
        "200": { description: Saved view, content: { application/json: { schema: { $ref: "#/components/schemas/SavedView" } } } }
        "404": { $ref: "#/components/responses/Error" }
    patch:
      tags: [saved-views]
      summary: Update a saved view
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/SavedViewInput" } } }
      responses:
        "200": { description: Updated, content: { application/json: { schema: { $ref: "#/components/schemas/SavedView" } } } }
        "404": { $ref: "#/components/responses/Error" }
    delete:
      tags: [saved-views]
      summary: Delete a saved view
      responses:
        "204": { description: Deleted }
        "404": { $ref: "#/components/responses/Error" }

  /schema/export:
    get:
      tags: [schema]
      summary: Export the tenant's schema as a portable bundle
      description: >
        Returns type definitions, attributes, relationship definitions and
        dependencies keyed by internal name (never by ID), so the bundle is
        portable across instances.
      responses:
        "200":
          description: Schema bundle
          content: { application/json: { schema: { $ref: "#/components/schemas/SchemaBundle" } } }
  /schema/import:
    post:
      tags: [schema]
      summary: Import a schema bundle (idempotent)
      description: >
        Creates objects missing by internal name and skips those already
        present, in dependency order. Re-running is safe and completes a
        partial import. Not a single transaction.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SchemaBundle" }
      responses:
        "200":
          description: Per-kind created/skipped counts
          content:
            application/json:
              schema:
                type: object
                properties:
                  types: { $ref: "#/components/schemas/ImportKindCount" }
                  attributes: { $ref: "#/components/schemas/ImportKindCount" }
                  relationship_definitions: { $ref: "#/components/schemas/ImportKindCount" }
                  dependencies: { $ref: "#/components/schemas/ImportKindCount" }
        "422": { $ref: "#/components/responses/Error" }

  /entities/{typeDefinitionID}:
    get:
      tags: [entities]
      summary: List entities of a type
      parameters:
        - name: typeDefinitionID
          in: path
          required: true
          schema: { type: string }
        - name: include_descendants
          in: query
          schema: { type: boolean }
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
      responses:
        "200":
          description: Entity summaries
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/EntitySummary" }
                  page_info: { $ref: "#/components/schemas/PageInfo" }
  /entities/{typeDefinitionID}/{entityID}:
    delete:
      tags: [entities]
      summary: Remove an entity (cascade)
      description: >
        Archives every live value of the entity and unlinks every live
        relationship touching it, in one unit of work. NotFound if the
        entity has no values and no links.
      parameters:
        - { name: typeDefinitionID, in: path, required: true, schema: { type: string } }
        - { name: entityID, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Cascade summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  entity_id: { type: string }
                  values_removed: { type: integer }
                  relationships_gone: { type: integer }
        "404": { $ref: "#/components/responses/Error" }
  /entities/{typeDefinitionID}/{entityID}/purge:
    post:
      tags: [entities]
      summary: Erase an entity (hard delete, admin scope)
      description: >
        Permanently and IRREVERSIBLY hard-deletes every trace of the entity —
        all attribute values (archived rows included), all revisions, every
        relationship link it participates in, and the backing media blobs — in
        one audited unit of work. This is the right-to-erasure primitive, distinct
        from the soft-delete DELETE. Requires the admin scope. NotFound if the
        entity has no values, revisions or links.
      parameters:
        - { name: typeDefinitionID, in: path, required: true, schema: { type: string } }
        - { name: entityID, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Erasure receipt (counts of what was purged)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PurgeReport" }
        "403": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }
  /entities/{typeDefinitionID}/{entityID}/values:
    get:
      tags: [entities]
      summary: List an entity's live values
      parameters:
        - { name: typeDefinitionID, in: path, required: true, schema: { type: string } }
        - { name: entityID, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Live values
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Value" }
  /entities/{typeDefinitionID}/{entityID}/relationships:
    get:
      tags: [entities]
      summary: List an entity's relationships
      parameters:
        - { name: typeDefinitionID, in: path, required: true, schema: { type: string } }
        - { name: entityID, in: path, required: true, schema: { type: string } }
      responses:
        "200": { description: Entity links }
  /entities/{typeDefinitionID}/{entityID}/attributes/{attributeID}/effective-schema:
    get:
      tags: [entities]
      summary: Resolve the effective schema of one attribute for one entity
      parameters:
        - { name: typeDefinitionID, in: path, required: true, schema: { type: string } }
        - { name: entityID, in: path, required: true, schema: { type: string } }
        - { name: attributeID, in: path, required: true, schema: { type: string } }
      responses:
        "200": { description: "Effective schema (allowed values, required, restricted)" }

  /dependencies:
    get:
      tags: [dependencies]
      summary: List dependencies
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
      responses:
        "200": { description: Dependency page }
    post:
      tags: [dependencies]
      summary: Create a dependency
      requestBody: { required: true, content: { application/json: { schema: { type: object } } } }
      responses:
        "201": { description: Created dependency }
        "422": { $ref: "#/components/responses/Error" }
  /dependencies/{id}:
    parameters: [{ $ref: "#/components/parameters/ID" }]
    get:
      tags: [dependencies]
      summary: Get a dependency
      responses: { "200": { description: Dependency }, "404": { $ref: "#/components/responses/Error" } }
    patch:
      tags: [dependencies]
      summary: Update a dependency
      requestBody: { required: true, content: { application/json: { schema: { type: object } } } }
      responses: { "200": { description: Updated dependency } }
    delete:
      tags: [dependencies]
      summary: Archive a dependency
      responses: { "200": { description: Archived dependency } }

  /relationship-definitions:
    get:
      tags: [relationships]
      summary: List relationship definitions
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
        - { name: type_definition_id, in: query, schema: { type: string } }
        - $ref: "#/components/parameters/IncludeArchived"
      responses: { "200": { description: Relationship-definition page } }
    post:
      tags: [relationships]
      summary: Create a relationship definition
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateRelationshipDefinition" }
      responses:
        "201": { description: Created relationship definition }
        "422": { $ref: "#/components/responses/Error" }
  /relationship-definitions/{id}:
    parameters: [{ $ref: "#/components/parameters/ID" }]
    get: { tags: [relationships], summary: Get a relationship definition, responses: { "200": { description: Relationship definition }, "404": { $ref: "#/components/responses/Error" } } }
    patch:
      tags: [relationships]
      summary: Update a relationship definition
      requestBody: { required: true, content: { application/json: { schema: { type: object } } } }
      responses: { "200": { description: Updated } }
  /relationship-definitions/{id}/archive:
    parameters: [{ $ref: "#/components/parameters/ID" }]
    post: { tags: [relationships], summary: Archive, responses: { "200": { description: Archived } } }
  /relationship-definitions/{id}/restore:
    parameters: [{ $ref: "#/components/parameters/ID" }]
    post: { tags: [relationships], summary: Restore, responses: { "200": { description: Restored } } }
  /relationship-definitions/{id}/attribute-sets:
    parameters: [{ $ref: "#/components/parameters/ID" }]
    get: { tags: [relationships], summary: List the inherited attribute-set chain, responses: { "200": { description: Attribute set ids } } }

  /relationships:
    get:
      tags: [relationships]
      summary: List relationships
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
      responses: { "200": { description: Relationship page } }
    post:
      tags: [relationships]
      summary: Link two entities
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/Link" }
      responses:
        "201": { description: Created link }
        "409": { $ref: "#/components/responses/Error" }
        "422": { $ref: "#/components/responses/Error" }
  /relationships/{id}:
    parameters: [{ $ref: "#/components/parameters/ID" }]
    get: { tags: [relationships], summary: Get a relationship, responses: { "200": { description: Relationship }, "404": { $ref: "#/components/responses/Error" } } }
    delete: { tags: [relationships], summary: Unlink, responses: { "200": { description: Unlinked } } }

  /query:
    get:
      tags: [query]
      summary: Run an FQL query
      parameters:
        - { name: type, in: query, required: true, schema: { type: string }, description: Root type internal name }
        - { name: q, in: query, required: true, schema: { type: string }, description: FQL expression }
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
      responses:
        "200":
          description: Matching entities
          content:
            application/json:
              schema:
                type: object
                properties:
                  items: { type: array, items: { $ref: "#/components/schemas/EntitySummary" } }
                  page_info: { $ref: "#/components/schemas/PageInfo" }
        "422": { $ref: "#/components/responses/Error" }
        "501": { $ref: "#/components/responses/Error" }
  /query/validate:
    post:
      tags: [query]
      summary: Validate an FQL query without running it
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, properties: { type: { type: string }, q: { type: string } } }
      responses:
        "200": { description: Valid, content: { application/json: { schema: { type: object, properties: { valid: { type: boolean } } } } } }
        "422": { $ref: "#/components/responses/Error" }

  /search/reindex:
    post:
      tags: [ops]
      summary: Rebuild the entity search projection
      responses:
        "200": { description: Reindexed count, content: { application/json: { schema: { type: object, properties: { reindexed: { type: integer } } } } } }
        "501": { $ref: "#/components/responses/Error" }

  /activity:
    get:
      tags: [activity]
      summary: List the audit log
      parameters:
        - { name: entity, in: query, schema: { type: string } }
        - { name: entity_id, in: query, schema: { type: string } }
        - { name: actor, in: query, schema: { type: string } }
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
      responses:
        "200": { description: Activity page }
        "501": { $ref: "#/components/responses/Error" }

  /webhook-subscriptions:
    get:
      tags: [event-delivery]
      summary: List webhook subscriptions
      responses:
        "200": { description: Subscriptions }
        "501": { $ref: "#/components/responses/Error" }
    post:
      tags: [event-delivery]
      summary: Register a webhook subscription
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateSubscription" }
      responses:
        "201": { $ref: "#/components/responses/Subscription" }
        "409": { $ref: "#/components/responses/Error" }
        "422": { $ref: "#/components/responses/Error" }
  /webhook-subscriptions/{id}:
    parameters: [{ $ref: "#/components/parameters/ID" }]
    get: { tags: [event-delivery], summary: Get a subscription, responses: { "200": { $ref: "#/components/responses/Subscription" }, "404": { $ref: "#/components/responses/Error" } } }
    patch:
      tags: [event-delivery]
      summary: Update a subscription (or rotate its secret)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateSubscription" }
      responses: { "200": { $ref: "#/components/responses/Subscription" } }
    delete: { tags: [event-delivery], summary: Delete a subscription, responses: { "204": { description: Deleted } } }
  /webhook-subscriptions/{id}/deliveries:
    parameters: [{ $ref: "#/components/parameters/ID" }]
    get:
      tags: [event-delivery]
      summary: List a subscription's delivery log
      parameters:
        - { name: status, in: query, schema: { type: string, enum: [pending, inflight, delivered, dead] } }
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
      responses: { "200": { description: Delivery page } }
  /webhook-deliveries/{id}/redeliver:
    parameters: [{ $ref: "#/components/parameters/ID" }]
    post:
      tags: [event-delivery]
      summary: Requeue a dead or delivered delivery
      responses:
        "200": { description: Requeued }
        "409": { $ref: "#/components/responses/Error" }

  /events:
    get:
      tags: [event-delivery]
      summary: Page the ordered event feed
      parameters:
        - { name: after, in: query, schema: { type: integer, format: int64 }, description: Feed cursor (feed_seq) }
        - { name: types, in: query, schema: { type: string }, description: Comma-separated event types }
        - $ref: "#/components/parameters/Limit"
      responses:
        "200": { description: Feed page }
        "410": { $ref: "#/components/responses/Error" }
        "501": { $ref: "#/components/responses/Error" }
  /events/stream:
    get:
      tags: [event-delivery]
      summary: Server-sent events tail of the feed
      description: >
        Streams text/event-stream. Resume with the Last-Event-ID header
        carrying the last feed_seq seen.
      responses:
        "200": { description: SSE stream, content: { text/event-stream: {} } }
  /event-cursors/{consumer}:
    parameters: [{ name: consumer, in: path, required: true, schema: { type: string } }]
    get:
      tags: [event-delivery]
      summary: Read a named consumer cursor
      responses: { "200": { description: Cursor position } }
    put:
      tags: [event-delivery]
      summary: Commit a named cursor (compare-and-swap)
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, properties: { position: { type: integer, format: int64 }, expected: { type: integer, format: int64 } } }
      responses:
        "200": { description: Committed }
        "409": { $ref: "#/components/responses/Error" }

  /admin/purge:
    post:
      tags: [provisioning]
      summary: Erase the tenant's entity data (hard delete, admin scope)
      description: >
        Permanently and IRREVERSIBLY hard-deletes the calling tenant's entity
        DATA — every attribute value, revision, relationship link and search
        document — and garbage-collects the backing media blobs. The tenant is
        taken from the credential. Deliberately scoped to entity data: type and
        attribute definitions, unit families, saved views and the control plane
        survive. The erasure itself is audited. Requires the admin scope.
      responses:
        "200":
          description: Erasure receipt (counts of what was purged)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PurgeReport" }
        "403": { $ref: "#/components/responses/Error" }
  /tenants:
    get:
      tags: [provisioning]
      summary: List tenants (admin scope)
      description: >
        Requires the admin scope. Returns 501 when provisioning is not
        enabled for the deployment.
      responses:
        "200":
          description: Tenants
          content:
            application/json:
              schema:
                type: object
                properties: { items: { type: array, items: { $ref: "#/components/schemas/Tenant" } } }
        "403": { $ref: "#/components/responses/Error" }
        "501": { $ref: "#/components/responses/Error" }
    post:
      tags: [provisioning]
      summary: Create a tenant (admin scope)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties: { name: { type: string, description: "lowercase [a-z0-9_-], 2-64 chars" } }
      responses:
        "201":
          description: Created
          content: { application/json: { schema: { $ref: "#/components/schemas/Tenant" } } }
        "403": { $ref: "#/components/responses/Error" }
        "409": { $ref: "#/components/responses/Error" }
  /tenants/{name}:
    parameters: [{ name: name, in: path, required: true, schema: { type: string } }]
    patch:
      tags: [provisioning]
      summary: Activate or deactivate a tenant (admin scope)
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, required: [active], properties: { active: { type: boolean } } }
      responses:
        "200": { description: Updated }
        "403": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }

  /service-accounts:
    get:
      tags: [provisioning]
      summary: List a tenant's service accounts (admin scope)
      parameters: [{ name: tenant_name, in: query, required: true, schema: { type: string } }]
      responses:
        "200":
          description: Service accounts (no secrets)
          content:
            application/json:
              schema:
                type: object
                properties: { items: { type: array, items: { $ref: "#/components/schemas/ServiceAccount" } } }
        "403": { $ref: "#/components/responses/Error" }
    post:
      tags: [provisioning]
      summary: Create a service account (admin scope)
      description: The bearer token is returned once and is never recoverable.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_name, name, scopes]
              properties:
                tenant_name: { type: string }
                name: { type: string, description: "lowercase [a-z0-9_-], 2-64 chars" }
                scopes: { type: array, items: { type: string, enum: [read, write, admin] } }
      responses:
        "201":
          description: Created (token shown once)
          content: { application/json: { schema: { $ref: "#/components/schemas/AccountWithToken" } } }
        "403": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }
  /service-accounts/{id}/rotate:
    parameters: [{ $ref: "#/components/parameters/ID" }]
    post:
      tags: [provisioning]
      summary: Rotate a service account's secret (admin scope)
      description: Returns a new token once; the previous secret stops working immediately.
      responses:
        "200":
          description: Rotated (new token shown once)
          content: { application/json: { schema: { $ref: "#/components/schemas/AccountWithToken" } } }
        "403": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }
  /service-accounts/{id}:
    parameters: [{ $ref: "#/components/parameters/ID" }]
    delete:
      tags: [provisioning]
      summary: Revoke a service account (admin scope)
      description: The token stops working within the auth cache TTL.
      responses:
        "204": { description: Revoked }
        "403": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }

  /type-definitions/{id}/completeness:
    parameters: [{ $ref: "#/components/parameters/ID" }]
    get:
      tags: [types]
      summary: Score a type's entities against their required schema
      responses:
        "200":
          description: Aggregate completeness across the type's entities
          content: { application/json: { schema: { $ref: "#/components/schemas/TypeCompleteness" } } }
        "404": { $ref: "#/components/responses/Error" }
  /type-definitions/{id}/match-rules:
    parameters: [{ $ref: "#/components/parameters/ID" }]
    get:
      tags: [dedup]
      summary: List a type's duplicate-match rules
      responses:
        "200":
          description: Match rules
          content:
            application/json:
              schema:
                type: object
                properties: { items: { type: array, items: { $ref: "#/components/schemas/MatchRule" } } }
    post:
      tags: [dedup]
      summary: Create a duplicate-match rule for a type
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateMatchRule" }
      responses:
        "201": { description: Created match rule, content: { application/json: { schema: { $ref: "#/components/schemas/MatchRule" } } } }
        "422": { $ref: "#/components/responses/Error" }
  /type-definitions/{id}/clone:
    parameters: [{ $ref: "#/components/parameters/ID" }]
    post:
      tags: [types]
      summary: Clone a type into a new independent root type
      description: >
        Copies the source type's declared attributes and the dependencies whose
        endpoints both belong to it. Values and hierarchy position are not
        copied; the clone is a fresh root.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CloneType" }
      responses:
        "201": { description: Clone result, content: { application/json: { schema: { $ref: "#/components/schemas/CloneResult" } } } }
        "409": { $ref: "#/components/responses/Error" }
        "422": { $ref: "#/components/responses/Error" }

  /match-rules/{ruleID}:
    parameters: [{ name: ruleID, in: path, required: true, schema: { type: string } }]
    delete:
      tags: [dedup]
      summary: Delete a match rule
      responses:
        "204": { description: Deleted }
        "404": { $ref: "#/components/responses/Error" }
  /match-rules/{ruleID}/scan:
    parameters: [{ name: ruleID, in: path, required: true, schema: { type: string } }]
    get:
      tags: [dedup]
      summary: Scan a rule for candidate duplicate pairs
      description: >
        Runs the matching rule over the type's current values and returns
        candidate pairs highest score first, excluding dismissed pairs. Reads
        only committed data and never writes.
      responses:
        "200": { description: Candidate duplicate pairs, content: { application/json: { schema: { $ref: "#/components/schemas/ScanResult" } } } }
        "404": { $ref: "#/components/responses/Error" }
  /match-rules/{ruleID}/dismiss:
    parameters: [{ name: ruleID, in: path, required: true, schema: { type: string } }]
    post:
      tags: [dedup]
      summary: Dismiss a candidate pair as not a duplicate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [entity_a, entity_b]
              properties:
                entity_a: { type: string }
                entity_b: { type: string }
      responses:
        "204": { description: Dismissed }
        "404": { $ref: "#/components/responses/Error" }

  /schema/templates:
    get:
      tags: [schema]
      summary: List the curated schema templates
      responses:
        "200":
          description: Template summaries
          content:
            application/json:
              schema:
                type: object
                properties: { items: { type: array, items: { $ref: "#/components/schemas/SchemaTemplateSummary" } } }
  /schema/templates/{name}:
    parameters: [{ name: name, in: path, required: true, schema: { type: string } }]
    get:
      tags: [schema]
      summary: Get one schema template with its bundle
      responses:
        "200": { description: Template, content: { application/json: { schema: { $ref: "#/components/schemas/SchemaTemplate" } } } }
        "404": { $ref: "#/components/responses/Error" }
  /schema/templates/{name}/apply:
    parameters: [{ name: name, in: path, required: true, schema: { type: string } }]
    post:
      tags: [schema]
      summary: Apply a template bundle into the caller's tenant (idempotent)
      responses:
        "200":
          description: Per-kind created/skipped counts
          content:
            application/json:
              schema:
                type: object
                properties:
                  types: { $ref: "#/components/schemas/ImportKindCount" }
                  attributes: { $ref: "#/components/schemas/ImportKindCount" }
                  relationship_definitions: { $ref: "#/components/schemas/ImportKindCount" }
                  dependencies: { $ref: "#/components/schemas/ImportKindCount" }
        "404": { $ref: "#/components/responses/Error" }

  /entities/{typeDefinitionID}/grid:
    parameters: [{ name: typeDefinitionID, in: path, required: true, schema: { type: string } }]
    get:
      tags: [entities]
      summary: Project a page of entities onto chosen attribute columns
      description: >
        One list/query round-trip plus one batched value load — no N+1.
        `attributes` chooses the value columns; `query` (FQL) filters the rows.
      parameters:
        - { name: attributes, in: query, schema: { type: string }, description: Comma-separated attribute internal names to project as columns }
        - { name: query, in: query, schema: { type: string }, description: Optional FQL filter }
        - { name: include_descendants, in: query, schema: { type: boolean } }
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
      responses:
        "200":
          description: Grid page
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/GridResult"
                  - type: object
                    properties: { page_info: { $ref: "#/components/schemas/PageInfo" } }
  /entities/{typeDefinitionID}/facets:
    parameters: [{ name: typeDefinitionID, in: path, required: true, schema: { type: string } }]
    get:
      tags: [entities]
      summary: Count attribute values across the current result set
      parameters:
        - { name: attributes, in: query, schema: { type: string }, description: Comma-separated attribute internal names to facet }
        - { name: query, in: query, schema: { type: string }, description: Optional FQL filter }
      responses:
        "200": { description: Facet buckets keyed by attribute, content: { application/json: { schema: { $ref: "#/components/schemas/Facets" } } } }
  /entities/{typeDefinitionID}/import:
    parameters: [{ name: typeDefinitionID, in: path, required: true, schema: { type: string } }]
    post:
      tags: [entities]
      summary: Import a CSV of entity values
      description: >
        Multipart upload: the CSV as `file` and a JSON `mapping` describing the
        key column, column-to-attribute map, commit mode and dry-run flag.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file, mapping]
              properties:
                file: { type: string, format: binary }
                mapping: { type: string, description: "JSON: key_column, mapping, mode, dry_run" }
      responses:
        "200": { description: Import report, content: { application/json: { schema: { $ref: "#/components/schemas/ImportReport" } } } }
        "422": { $ref: "#/components/responses/Error" }
  /entities/{typeDefinitionID}/export:
    parameters: [{ name: typeDefinitionID, in: path, required: true, schema: { type: string } }]
    get:
      tags: [entities]
      summary: Export a type's entities as CSV
      parameters:
        - { name: attributes, in: query, schema: { type: string }, description: Comma-separated attribute internal names (columns) }
        - { name: query, in: query, schema: { type: string }, description: Optional FQL filter }
        - { name: entity_ids, in: query, schema: { type: string }, description: Optional explicit comma-separated entity ids }
      responses:
        "200":
          description: CSV export
          content:
            text/csv:
              schema: { type: string }
  /entities/{typeDefinitionID}/{entityID}/as-of:
    parameters:
      - { name: typeDefinitionID, in: path, required: true, schema: { type: string } }
      - { name: entityID, in: path, required: true, schema: { type: string } }
    get:
      tags: [entities]
      summary: Reconstruct an entity's revision as of an instant
      parameters:
        - { name: at, in: query, required: true, schema: { type: string, format: date-time }, description: RFC3339 timestamp }
      responses:
        "200": { description: The latest revision at or before the instant, content: { application/json: { schema: { $ref: "#/components/schemas/Revision" } } } }
        "404": { $ref: "#/components/responses/Error" }
        "422": { $ref: "#/components/responses/Error" }
  /entities/{typeDefinitionID}/{entityID}/completeness:
    parameters:
      - { name: typeDefinitionID, in: path, required: true, schema: { type: string } }
      - { name: entityID, in: path, required: true, schema: { type: string } }
    get:
      tags: [entities]
      summary: Score one entity against its required schema
      responses:
        "200": { description: Completeness for the entity, content: { application/json: { schema: { $ref: "#/components/schemas/Completeness" } } } }
        "404": { $ref: "#/components/responses/Error" }
  /entities/{typeDefinitionID}/{entityID}/relationship-requirements:
    parameters:
      - { name: typeDefinitionID, in: path, required: true, schema: { type: string } }
      - { name: entityID, in: path, required: true, schema: { type: string } }
    get:
      tags: [entities]
      summary: List relationship definitions whose minimum cardinality is unmet
      responses:
        "200":
          description: Unmet relationship requirements
          content:
            application/json:
              schema:
                type: object
                properties: { items: { type: array, items: { $ref: "#/components/schemas/RelationshipRequirement" } } }
  /entities/{typeDefinitionID}/{entityID}/revisions:
    parameters:
      - { name: typeDefinitionID, in: path, required: true, schema: { type: string } }
      - { name: entityID, in: path, required: true, schema: { type: string } }
    get:
      tags: [revisions]
      summary: List an entity's revisions
      responses:
        "200":
          description: Revisions
          content:
            application/json:
              schema:
                type: object
                properties: { items: { type: array, items: { $ref: "#/components/schemas/Revision" } } }
    post:
      tags: [revisions]
      summary: Snapshot the entity's current values as a new revision
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties: { label: { type: string } }
      responses:
        "201": { description: Created revision, content: { application/json: { schema: { $ref: "#/components/schemas/Revision" } } } }
        "404": { $ref: "#/components/responses/Error" }
  /entities/{typeDefinitionID}/{entityID}/attributes/{attributeID}/media:
    parameters:
      - { name: typeDefinitionID, in: path, required: true, schema: { type: string } }
      - { name: entityID, in: path, required: true, schema: { type: string } }
      - { name: attributeID, in: path, required: true, schema: { type: string } }
    post:
      tags: [media]
      summary: Upload a file for a media attribute
      description: Multipart upload carrying the file as `file`; writes the resulting media value.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file: { type: string, format: binary }
      responses:
        "201": { description: The stored media value, content: { application/json: { schema: { $ref: "#/components/schemas/Value" } } } }
        "422": { $ref: "#/components/responses/Error" }

  /revisions/{id}:
    parameters: [{ $ref: "#/components/parameters/ID" }]
    get:
      tags: [revisions]
      summary: Get a revision
      responses:
        "200": { description: Revision, content: { application/json: { schema: { $ref: "#/components/schemas/Revision" } } } }
        "404": { $ref: "#/components/responses/Error" }
  /revisions/{id}/diff:
    parameters: [{ $ref: "#/components/parameters/ID" }]
    get:
      tags: [revisions]
      summary: Diff this revision against another
      parameters:
        - { name: to, in: query, required: true, schema: { type: string }, description: The other revision id }
      responses:
        "200": { description: The changes from this revision to the other, content: { application/json: { schema: { $ref: "#/components/schemas/RevisionDiff" } } } }
        "404": { $ref: "#/components/responses/Error" }
        "422": { $ref: "#/components/responses/Error" }
  /revisions/{id}/restore:
    parameters: [{ $ref: "#/components/parameters/ID" }]
    post:
      tags: [revisions]
      summary: Restore an entity to this revision
      responses:
        "201": { description: The new revision created by the restore, content: { application/json: { schema: { $ref: "#/components/schemas/Revision" } } } }
        "404": { $ref: "#/components/responses/Error" }

  /media/{objectKey}:
    parameters: [{ name: objectKey, in: path, required: true, schema: { type: string } }]
    get:
      tags: [media]
      summary: Download a stored media object by key
      responses:
        "200":
          description: The stored object
          content:
            application/octet-stream:
              schema: { type: string, format: binary }
        "404": { $ref: "#/components/responses/Error" }

  /unit-families:
    get:
      tags: [units]
      summary: List unit families
      responses:
        "200":
          description: Unit families
          content:
            application/json:
              schema:
                type: object
                properties: { items: { type: array, items: { $ref: "#/components/schemas/UnitFamily" } } }
    post:
      tags: [units]
      summary: Create a unit family
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateUnitFamily" }
      responses:
        "201": { description: Created unit family, content: { application/json: { schema: { $ref: "#/components/schemas/UnitFamily" } } } }
        "409": { $ref: "#/components/responses/Error" }
        "422": { $ref: "#/components/responses/Error" }
  /unit-families/{id}:
    parameters: [{ $ref: "#/components/parameters/ID" }]
    get:
      tags: [units]
      summary: Get a unit family
      responses:
        "200": { description: Unit family, content: { application/json: { schema: { $ref: "#/components/schemas/UnitFamily" } } } }
        "404": { $ref: "#/components/responses/Error" }
    delete:
      tags: [units]
      summary: Delete a unit family
      responses:
        "204": { description: Deleted }
        "404": { $ref: "#/components/responses/Error" }

  /changesets:
    get:
      tags: [changesets]
      summary: List change-sets
      responses:
        "200":
          description: Change-sets
          content:
            application/json:
              schema:
                type: object
                properties: { items: { type: array, items: { $ref: "#/components/schemas/ChangeSet" } } }
    post:
      tags: [changesets]
      summary: Open a change-set
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateChangeSet" }
      responses:
        "201": { description: Created change-set, content: { application/json: { schema: { $ref: "#/components/schemas/ChangeSet" } } } }
        "422": { $ref: "#/components/responses/Error" }
  /changesets/{id}:
    parameters: [{ $ref: "#/components/parameters/ID" }]
    get:
      tags: [changesets]
      summary: Get a change-set
      responses:
        "200": { description: Change-set, content: { application/json: { schema: { $ref: "#/components/schemas/ChangeSet" } } } }
        "404": { $ref: "#/components/responses/Error" }
  /changesets/{id}/mutations:
    parameters: [{ $ref: "#/components/parameters/ID" }]
    post:
      tags: [changesets]
      summary: Stage a value mutation on a change-set
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/Mutation" }
      responses:
        "200": { description: The updated change-set, content: { application/json: { schema: { $ref: "#/components/schemas/ChangeSet" } } } }
        "404": { $ref: "#/components/responses/Error" }
        "422": { $ref: "#/components/responses/Error" }
  /changesets/{id}/submit:
    parameters: [{ $ref: "#/components/parameters/ID" }]
    post:
      tags: [changesets]
      summary: Submit a change-set for review
      responses:
        "200": { description: The updated change-set, content: { application/json: { schema: { $ref: "#/components/schemas/ChangeSet" } } } }
        "404": { $ref: "#/components/responses/Error" }
        "422": { $ref: "#/components/responses/Error" }
  /changesets/{id}/approve:
    parameters: [{ $ref: "#/components/parameters/ID" }]
    post:
      tags: [changesets]
      summary: Approve a change-set in review
      responses:
        "200": { description: The updated change-set, content: { application/json: { schema: { $ref: "#/components/schemas/ChangeSet" } } } }
        "404": { $ref: "#/components/responses/Error" }
        "422": { $ref: "#/components/responses/Error" }
  /changesets/{id}/reject:
    parameters: [{ $ref: "#/components/parameters/ID" }]
    post:
      tags: [changesets]
      summary: Reject a change-set in review
      responses:
        "200": { description: The updated change-set, content: { application/json: { schema: { $ref: "#/components/schemas/ChangeSet" } } } }
        "404": { $ref: "#/components/responses/Error" }
        "422": { $ref: "#/components/responses/Error" }
  /changesets/{id}/publish:
    parameters: [{ $ref: "#/components/parameters/ID" }]
    post:
      tags: [changesets]
      summary: Publish an approved change-set
      responses:
        "200": { description: The updated change-set, content: { application/json: { schema: { $ref: "#/components/schemas/ChangeSet" } } } }
        "404": { $ref: "#/components/responses/Error" }
        "422": { $ref: "#/components/responses/Error" }

  /graphql:
    get:
      tags: [graphql]
      summary: Run a read-only GraphQL query (via query params)
      parameters:
        - { name: query, in: query, required: true, schema: { type: string } }
        - { name: variables, in: query, schema: { type: string }, description: JSON-encoded variables }
      responses:
        "200": { description: "GraphQL result (query-level errors are reported in the body)", content: { application/json: { schema: { $ref: "#/components/schemas/GraphQLResult" } } } }
    post:
      tags: [graphql]
      summary: Run a read-only GraphQL query
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [query]
              properties:
                query: { type: string }
                variables: { type: object, additionalProperties: true }
                operationName: { type: string }
      responses:
        "200": { description: "GraphQL result (query-level errors are reported in the body)", content: { application/json: { schema: { $ref: "#/components/schemas/GraphQLResult" } } } }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: >
        Service-account token, `ft_<account>_<secret>`. Omit auth in
        development mode (no service-account file configured).

  parameters:
    ID:
      name: id
      in: path
      required: true
      schema: { type: string }
    Limit:
      name: limit
      in: query
      schema: { type: integer, minimum: 1, maximum: 500 }
    Cursor:
      name: cursor
      in: query
      schema: { type: string }
    IncludeArchived:
      name: include_archived
      in: query
      schema: { type: boolean }

  responses:
    Error:
      description: Error with a stable machine code
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    TypeDefinition:
      description: A type definition
      content:
        application/json:
          schema: { $ref: "#/components/schemas/TypeDefinition" }
    TypeDefinitionPage:
      description: A page of type definitions
      content:
        application/json:
          schema:
            type: object
            properties:
              items: { type: array, items: { $ref: "#/components/schemas/TypeDefinition" } }
              page_info: { $ref: "#/components/schemas/PageInfo" }
    Attribute:
      description: An attribute definition
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Attribute" }
    AttributePage:
      description: A page of attribute definitions
      content:
        application/json:
          schema:
            type: object
            properties:
              items: { type: array, items: { $ref: "#/components/schemas/Attribute" } }
              page_info: { $ref: "#/components/schemas/PageInfo" }
    Value:
      description: A stored attribute value
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Value" }
    ValuePage:
      description: A page of values
      content:
        application/json:
          schema:
            type: object
            properties:
              items: { type: array, items: { $ref: "#/components/schemas/Value" } }
              page_info: { $ref: "#/components/schemas/PageInfo" }
    Subscription:
      description: A webhook subscription (secrets never returned)
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Subscription" }

  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              enum: [VALIDATION, NOT_FOUND, CONFLICT, ARCHIVED, DEPENDENCY_VIOLATION, FEATURE_DISABLED, CURSOR_CONFLICT, CURSOR_EXPIRED, UNAUTHENTICATED, FORBIDDEN, RATE_LIMITED, INTERNAL]
            message: { type: string }
            details: { type: object, additionalProperties: true }
    PageInfo:
      type: object
      properties:
        total_count: { type: integer }
        has_next_page: { type: boolean }
        has_previous_page: { type: boolean }
        next_cursor: { type: string }
    DataType:
      type: string
      enum: [bool, string, integer, float, decimal, date, time, datetime, enum, url, email, json]
    TypeDefinition:
      type: object
      properties:
        id: { type: string }
        tenant_id: { type: string }
        internal_name: { type: string }
        display_name: { type: string }
        description: { type: string }
        extends_id: { type: string }
        kind: { type: string }
        version: { type: integer }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        archived_at: { type: string, format: date-time }
    CreateTypeDefinition:
      type: object
      required: [internal_name, display_name]
      properties:
        internal_name: { type: string }
        display_name: { type: string }
        description: { type: string }
        extends_id: { type: string, description: Parent type for inheritance; immutable }
    UpdateDisplay:
      type: object
      required: [display_name]
      properties:
        display_name: { type: string }
        description: { type: string }
    Attribute:
      type: object
      properties:
        id: { type: string }
        tenant_id: { type: string }
        type_definition_id: { type: string }
        internal_name: { type: string }
        display_name: { type: string }
        description: { type: string }
        data_type: { $ref: "#/components/schemas/DataType" }
        required: { type: boolean }
        multi_valued: { type: boolean }
        unique: { type: boolean }
        group: { type: string }
        sort_order: { type: integer }
        help_text: { type: string }
        constraints: { type: array, items: { type: object } }
        default_value: {}
        version: { type: integer }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        archived_at: { type: string, format: date-time }
    CreateAttribute:
      type: object
      required: [type_definition_id, internal_name, display_name, data_type]
      properties:
        type_definition_id: { type: string }
        internal_name: { type: string }
        display_name: { type: string }
        description: { type: string }
        data_type: { $ref: "#/components/schemas/DataType" }
        required: { type: boolean }
        multi_valued: { type: boolean }
        unique: { type: boolean }
        group: { type: string }
        sort_order: { type: integer }
        help_text: { type: string }
        constraints: { type: array, items: { type: object } }
        default_value: {}
    UpdateAttribute:
      type: object
      required: [display_name]
      properties:
        display_name: { type: string }
        description: { type: string }
        required: { type: boolean }
        multi_valued: { type: boolean }
        unique: { type: boolean }
        group: { type: string }
        sort_order: { type: integer }
        help_text: { type: string }
        constraints: { type: array, items: { type: object } }
        default_value: {}
    Value:
      type: object
      properties:
        id: { type: string }
        tenant_id: { type: string }
        type_definition_id: { type: string }
        attribute_definition_id: { type: string }
        entity_id: { type: string }
        value: {}
        definition_version: { type: integer }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        archived_at: { type: string, format: date-time }
    SetValue:
      type: object
      required: [attribute_definition_id, entity_id, value]
      properties:
        attribute_definition_id: { type: string }
        entity_id: { type: string }
        type_definition_id: { type: string, description: Entity's declared type; defaults to the attribute's type }
        value:
          description: The value; typed per the attribute's data_type
    EntitySummary:
      type: object
      properties:
        entity_id: { type: string }
        type_definition_id: { type: string }
        value_count: { type: integer }
        last_updated_at: { type: string, format: date-time }
    PurgeReport:
      type: object
      description: The audited receipt of a hard delete (right-to-erasure).
      properties:
        entity_id: { type: string, description: "set for a per-entity purge; omitted for a tenant purge" }
        values_purged: { type: integer }
        revisions_purged: { type: integer }
        relationships_gone: { type: integer }
        search_docs_purged: { type: integer }
        media_blobs_purged: { type: integer }
    EffectiveAttribute:
      type: object
      properties:
        attribute: { $ref: "#/components/schemas/Attribute" }
        declared_in: { $ref: "#/components/schemas/TypeDefinition" }
    CreateRelationshipDefinition:
      type: object
      required: [internal_name, display_name, parent_type_id, child_type_id]
      properties:
        internal_name: { type: string }
        display_name: { type: string }
        description: { type: string }
        kind: { type: string, enum: [directed, symmetric] }
        parent_type_id: { type: string }
        child_type_id: { type: string }
        parent_label: { type: string }
        child_label: { type: string }
        extends_id: { type: string }
        parent_version_policy: { type: string, enum: [latest, pinned] }
        child_version_policy: { type: string, enum: [latest, pinned] }
        min_children: { type: integer, nullable: true }
        max_children: { type: integer, nullable: true }
        min_parents: { type: integer, nullable: true }
        max_parents: { type: integer, nullable: true }
    Link:
      type: object
      required: [relationship_definition_id, parent_entity_id, child_entity_id]
      properties:
        relationship_definition_id: { type: string }
        parent_entity_id: { type: string }
        child_entity_id: { type: string }
        parent_type_version: { type: integer }
        child_type_version: { type: integer }
    Subscription:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        url: { type: string }
        event_types: { type: array, items: { type: string } }
        active: { type: boolean }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    CreateSubscription:
      type: object
      required: [name, url]
      properties:
        name: { type: string }
        url: { type: string, format: uri, description: Public https endpoint (SSRF-guarded) }
        secret: { type: string }
        event_types: { type: array, items: { type: string }, description: Empty means all events }
        active: { type: boolean }
    UpdateSubscription:
      type: object
      properties:
        url: { type: string, format: uri }
        event_types: { type: array, items: { type: string } }
        active: { type: boolean }
        rotate_secret: { type: string }
    Tenant:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        active: { type: boolean }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    ServiceAccount:
      type: object
      description: A machine identity; secrets are never returned here.
      properties:
        id: { type: string }
        tenant_id: { type: string }
        name: { type: string }
        scopes: { type: array, items: { type: string, enum: [read, write, admin] } }
        active: { type: boolean }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    AccountWithToken:
      type: object
      description: A created or rotated account paired with its one-time token.
      properties:
        account: { $ref: "#/components/schemas/ServiceAccount" }
        token:
          type: string
          description: Bearer token, shown exactly once; not recoverable afterward.
    ImportKindCount:
      type: object
      properties:
        created: { type: integer }
        skipped: { type: integer }
    SavedViewInput:
      type: object
      required: [name, root_type]
      properties:
        name: { type: string }
        root_type: { type: string, description: Root type internal name }
        query: { type: string }
        columns: { type: array, items: { type: string } }
        sort: { type: string }
    SavedView:
      allOf:
        - $ref: "#/components/schemas/SavedViewInput"
        - type: object
          properties:
            id: { type: string }
            tenant_id: { type: string }
            created_at: { type: string, format: date-time }
            updated_at: { type: string, format: date-time }
    SchemaBundle:
      type: object
      description: A portable, internal-name-keyed snapshot of a tenant's schema.
      required: [version]
      properties:
        version: { type: integer, description: Bundle format version (currently 1) }
        types:
          type: array
          items:
            type: object
            properties:
              internal_name: { type: string }
              display_name: { type: string }
              description: { type: string }
              extends: { type: string, description: Parent type internal name }
        attributes:
          type: array
          items:
            type: object
            properties:
              type: { type: string, description: Declaring type internal name }
              internal_name: { type: string }
              display_name: { type: string }
              description: { type: string }
              data_type: { $ref: "#/components/schemas/DataType" }
              required: { type: boolean }
              multi_valued: { type: boolean }
              unique: { type: boolean }
              constraints: { type: array, items: { type: object, additionalProperties: true } }
              default_value: { type: object, additionalProperties: true }
        relationship_definitions:
          type: array
          items:
            type: object
            properties:
              internal_name: { type: string }
              display_name: { type: string }
              description: { type: string }
              kind: { type: string, enum: [directed, symmetric] }
              parent_type: { type: string }
              child_type: { type: string }
              parent_label: { type: string }
              child_label: { type: string }
              parent_version_policy: { type: string }
              child_version_policy: { type: string }
        dependencies:
          type: array
          items:
            type: object
            properties:
              source_type: { type: string }
              source_attribute: { type: string }
              target_type: { type: string }
              target_attribute: { type: string }
              conditions: { type: array, items: { type: object, additionalProperties: true } }
              effect: { type: object, additionalProperties: true }
              description: { type: string }
    ChangeSet:
      type: object
      description: A staged batch of value mutations moving through review to publish.
      properties:
        id: { type: string }
        tenant_id: { type: string }
        name: { type: string }
        state: { type: string, enum: [draft, in_review, approved, published, rejected] }
        require_approval: { type: boolean }
        author: { type: string }
        approver: { type: string }
        mutations: { type: array, items: { $ref: "#/components/schemas/Mutation" } }
        publish_at: { type: string, format: date-time }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        published_at: { type: string, format: date-time }
    CreateChangeSet:
      type: object
      required: [name]
      properties:
        name: { type: string }
        require_approval: { type: boolean, description: Demand an approver distinct from the author before publish }
        publish_at: { type: string, format: date-time, description: Schedule publication for a future instant }
    Mutation:
      type: object
      required: [kind, attribute_definition_id, entity_id]
      properties:
        kind: { type: string, enum: [set, remove] }
        attribute_definition_id: { type: string }
        entity_id: { type: string }
        type_definition_id: { type: string }
        locale: { type: string }
        channel: { type: string }
        value: { description: The value for a set mutation; typed per the attribute's data_type }
    UnitFamily:
      type: object
      description: A set of interconvertible units sharing a base unit.
      properties:
        id: { type: string }
        tenant_id: { type: string }
        name: { type: string }
        base_unit: { type: string, description: The unit factors convert to (factor 1) }
        units: { type: object, additionalProperties: { type: number }, description: Unit symbol to conversion factor }
    CreateUnitFamily:
      type: object
      required: [name, base_unit, units]
      properties:
        name: { type: string }
        base_unit: { type: string }
        units: { type: object, additionalProperties: { type: number } }
    MatchRule:
      type: object
      properties:
        id: { type: string }
        tenant_id: { type: string }
        type_definition_id: { type: string }
        attribute_definition_id: { type: string }
        strategy: { type: string, enum: [exact, case_insensitive, trigram] }
        threshold: { type: number, description: Minimum trigram similarity (0..1); ignored by exact/case_insensitive }
        created_at: { type: string, format: date-time }
    CreateMatchRule:
      type: object
      required: [attribute_definition_id, strategy]
      properties:
        attribute_definition_id: { type: string }
        strategy: { type: string, enum: [exact, case_insensitive, trigram] }
        threshold: { type: number }
    ScanResult:
      type: object
      properties:
        rule_id: { type: string }
        strategy: { type: string }
        truncated: { type: boolean }
        candidates: { type: array, items: { $ref: "#/components/schemas/ScanCandidate" } }
    ScanCandidate:
      type: object
      properties:
        entity_a: { type: string }
        entity_b: { type: string }
        value_a: { type: string }
        value_b: { type: string }
        score: { type: number }
    Completeness:
      type: object
      description: How much of an entity's dependency-adjusted required schema is filled.
      properties:
        entity_id: { type: string }
        type_definition_id: { type: string }
        required: { type: integer }
        filled: { type: integer }
        score: { type: number, description: "filled / required in [0,1]; 1 when nothing is required" }
        missing: { type: array, items: { $ref: "#/components/schemas/MissingAttribute" } }
    MissingAttribute:
      type: object
      properties:
        attribute_definition_id: { type: string }
        internal_name: { type: string }
        display_name: { type: string }
        group: { type: string }
    TypeCompleteness:
      type: object
      properties:
        type_definition_id: { type: string }
        count: { type: integer }
        scored: { type: integer }
        truncated: { type: boolean }
        average_score: { type: number }
        complete: { type: integer }
        incomplete: { type: integer }
        entities: { type: array, items: { $ref: "#/components/schemas/EntityScore" } }
    EntityScore:
      type: object
      properties:
        entity_id: { type: string }
        score: { type: number }
        filled: { type: integer }
        required: { type: integer }
    Revision:
      type: object
      description: An immutable snapshot of an entity's values at a point in time.
      properties:
        id: { type: string }
        tenant_id: { type: string }
        type_definition_id: { type: string }
        entity_id: { type: string }
        seq: { type: integer }
        label: { type: string }
        created_at: { type: string, format: date-time }
        values: { type: array, items: { type: object, additionalProperties: true } }
    RevisionDiff:
      type: object
      properties:
        from_seq: { type: integer }
        to_seq: { type: integer }
        changes: { type: array, items: { $ref: "#/components/schemas/RevisionChange" } }
    RevisionChange:
      type: object
      properties:
        attribute_definition_id: { type: string }
        internal_name: { type: string }
        locale: { type: string }
        channel: { type: string }
        kind: { type: string, enum: [added, changed, removed] }
        before: { type: string }
        after: { type: string }
    Facets:
      type: object
      properties:
        type_definition_id: { type: string }
        facets:
          type: object
          additionalProperties:
            type: array
            items: { $ref: "#/components/schemas/FacetBucket" }
    FacetBucket:
      type: object
      properties:
        value: { type: string }
        count: { type: integer }
    GridResult:
      type: object
      properties:
        columns: { type: array, items: { type: string } }
        rows: { type: array, items: { $ref: "#/components/schemas/GridRow" } }
    GridRow:
      type: object
      properties:
        entity_id: { type: string }
        values: { type: object, additionalProperties: { type: string } }
    RelationshipRequirement:
      type: object
      properties:
        definition_id: { type: string }
        definition_name: { type: string }
        side: { type: string, enum: [children, parents] }
        required: { type: integer }
        current: { type: integer }
    ImportReport:
      type: object
      properties:
        rows_total: { type: integer }
        rows_valid: { type: integer }
        rows_written: { type: integer }
        dry_run: { type: boolean }
        mode: { type: string }
        errors: { type: array, items: { $ref: "#/components/schemas/ImportError" } }
    ImportError:
      type: object
      properties:
        row: { type: integer }
        column: { type: string }
        attribute: { type: string }
        reason: { type: string }
    SchemaTemplateSummary:
      type: object
      properties:
        name: { type: string }
        title: { type: string }
        description: { type: string }
    SchemaTemplate:
      allOf:
        - $ref: "#/components/schemas/SchemaTemplateSummary"
        - type: object
          properties:
            bundle: { $ref: "#/components/schemas/SchemaBundle" }
    CloneType:
      type: object
      required: [internal_name]
      properties:
        internal_name: { type: string }
        display_name: { type: string, description: Defaults to the source type's display name }
    CloneResult:
      type: object
      properties:
        type: { $ref: "#/components/schemas/TypeDefinition" }
        attributes: { type: integer, description: Number of attributes copied }
        dependencies: { type: integer, description: Number of dependencies copied }
    GraphQLResult:
      type: object
      description: Standard GraphQL-over-HTTP response; query-level errors appear here with a 200 status.
      properties:
        data: { type: object, additionalProperties: true }
        errors: { type: array, items: { type: object, additionalProperties: true } }
