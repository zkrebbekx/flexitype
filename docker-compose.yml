version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: flexitype-postgres
    environment:
      POSTGRES_USER: flexitype
      POSTGRES_PASSWORD: flexitype
      POSTGRES_DB: flexitype
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flexitype"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flexitype-server
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - FLEXITYPE_PG_CONN=postgres://flexitype:flexitype@postgres:5432/flexitype?sslmode=disable
      - FLEXITYPE_PORT=8080
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  postgres-data:
    driver: local