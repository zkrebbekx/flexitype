id: "product-001"
name: "Product"
description: "Standard product type definition"
attributes:
  - id: "attr-001"
    name: "sku"
    description: "Stock keeping unit - unique product identifier"
    dataType: "string"
    required: true
    validationRules:
      - type: "required"
      - type: "pattern"
        parameters:
          pattern: "^[A-Z0-9]{6,10}$"

  - id: "attr-002" 
    name: "name"
    description: "Product name"
    dataType: "string"
    required: true
    validationRules:
      - type: "required"
      - type: "minLength"
        parameters:
          minLength: 3
      - type: "maxLength"
        parameters:
          maxLength: 100

  - id: "attr-003"
    name: "price"
    description: "Product price"
    dataType: "float"
    required: true
    validationRules:
      - type: "required"
      - type: "range"
        parameters:
          min: 0.01

  - id: "attr-004"
    name: "category"
    description: "Product category"
    dataType: "string"
    required: true
    cascade:
      enabled: true
      behavior: "inherit"
    validationRules:
      - type: "required"
      - type: "enum"
        parameters:
          allowedValues:
            - "Electronics"
            - "Clothing"
            - "Home & Garden"
            - "Books"
            - "Toys"
            
  - id: "attr-006"
    name: "tags"
    description: "Product tags for search and categorization"
    dataType: "string"
    required: false
    multiValued: true
    validationRules:
      - type: "pattern"
        parameters:
          pattern: "^[a-zA-Z0-9-]{1,20}$"

  - id: "attr-005"
    name: "inStock"
    description: "Whether the product is in stock"
    dataType: "boolean"
    required: false
    defaultValue: true

  - id: "attr-007"
    name: "backorderAllowed"
    description: "Whether backorder is allowed when product is out of stock"
    dataType: "boolean"
    required: false
    defaultValue: false
    cascade:
      enabled: true
      behavior: "inherit"
      logic: "inStock == false => backorderAllowed = true"